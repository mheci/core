name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ secrets.REGISTRY_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          build_chunked_oci: true
          max_layers: 128

  validate:
    name: Boot Validation
    needs: bluebuild
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils

      - name: Pull built image
        run: |
          podman pull "ghcr.io/mheci/core:latest"

      - name: Create bootable disk image
        id: disk-image
        continue-on-error: true
        run: |
          mkdir -p /tmp/bootc-output
          podman run --rm --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v /tmp/bootc-output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --output /output \
            "ghcr.io/mheci/core:latest"
          echo "disk=/tmp/bootc-output/qcow2/disk.qcow2" >> "$GITHUB_OUTPUT"

      - name: Boot VM and check for kernel panics
        if: steps.disk-image.outcome == 'success'
        run: |
          timeout 60 qemu-system-x86_64 \
            -machine type=q35,accel=tcg \
            -m 2048 \
            -smp 2 \
            -drive file="${{ steps.disk-image.outputs.disk }}",format=qcow2,if=virtio \
            -nographic \
            -serial mon:stdio 2>&1 | tee /tmp/serial.log || true
          if grep -qi "kernel panic\|BUG: unable to handle\|general protection fault" /tmp/serial.log 2>/dev/null; then
            echo "KERNEL PANIC OR CRASH DETECTED"
            exit 1
          fi
          if grep -qi "Started.*System Initialization\|Reached target.*Multi-User" /tmp/serial.log 2>/dev/null; then
            echo "Boot successful"
          else
            echo "Boot may not have reached multi-user target within time limit"
          fi

      - name: Validate image manifest
        if: always()
        run: |
          echo "Checking image manifest..."
          skopeo inspect "docker://ghcr.io/mheci/core:latest"
          echo "Image exists and is valid"
          skopeo inspect "docker://ghcr.io/mheci/core:f74c109-44" || true
          skopeo inspect "docker://ghcr.io/mheci/core:20260626-44" || true

---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
      copr:
        - codifryed/CoolerControl
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
        - https://packages.microsoft.com/keys/microsoft.asc
    install:
      packages:
        - brave-browser
        - code
        - kitty
        - coolercontrol
        - pcmanfm-qt
        - gvfs-mtp
        - gvfs-gphoto2
        - kio-fuse
        - kio-extras
        - ffmpegthumbs
        - kimageformats
        - kimageformats-raw
        - raw-thumbnailer
        - tumbler
        - tumbler-plugins-extra
        - hunspell
        - hunspell-en-US
        - hunspell-ar
        - scx-scheds
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: script
    snippets:
      - rm -f /var/lib/flatpak/system/accounts/*/repositories/org.mozilla.firefox* 2>/dev/null || true
      - rm -rf /usr/lib/firefox /usr/lib64/firefox /usr/share/firefox* 2>/dev/null || true
